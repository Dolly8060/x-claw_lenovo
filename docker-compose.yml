version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # 首次部署建议先在宿主机单独启动 SGLang（便于调试 GPU 和模型路径）
  sglang:
    image: sglang/sglang:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
    command: >
      python -m sglang.launch_server
      --model /models/mirothinker-30b
      --tp 1
      --quantization fp8
      --mem-fraction-static 0.85
      --max-model-len 131072
      --host 0.0.0.0
      --port 8000
    volumes:
      - ./models:/models
    ports:
      - "8000:8000"
    profiles:
      - gpu

  x-claw:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - chromadb
    volumes:
      - ./config:/app/config

volumes:
  redis_data:
  chroma_data:

