app:
  env: dev
  host: 0.0.0.0
  port: 8080
  log_level: INFO

llm:
  provider: mirothinker
  base_url: http://localhost:8000/v1
  api_key: dummy
  model: mirothinker-30b
  request_timeout_sec: 300

agent:
  max_iterations: 50
  enable_tool_calls: true
  max_tool_calls_default: 80

quota:
  simple_qa:
    daily: 100
    concurrent: 2
  deep_research:
    daily: 10
    concurrent: 1

